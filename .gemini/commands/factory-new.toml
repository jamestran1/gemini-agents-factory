description = "Start a new Gemini Agent Factory project session. Usage: /factory-new <project-id> <project-name>"
prompt = """
I want to start a new Gemini Agent Factory project session.
The arguments provided are: {{args}}

Please:
1. Parse these arguments to extract a 'Project ID' and a 'Project Name'.
2. If both are present:
   - Run the project state command: !{powershell.exe -NoProfile -Command ".\\src\\project_state.ps1 -Action Add -ProjectId '<ID>' -Name '<Name>'"} (replacing <ID> and <Name> with the actual values).
   - Run the start factory command: !{powershell.exe -NoProfile -Command ".\\src\\start_factory.ps1 -ProjectId '<ID>' -Agent 'master'"} (replacing <ID> with the actual project ID).
   - Confirm to the user that the project has been initialized and the Master Orchestrator session is launching.
3. If arguments are missing, provide the usage hint: /factory-new <project-id> <project-name>.
"""
