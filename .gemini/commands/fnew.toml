description = "Start a new Gemini Agent Factory project session."
prompt = """
I want to start a new Gemini Agent Factory project session.
Input: {{args}}

Instructions:
1. Extract 'Project ID' and 'Project Name' from Input (handles 'id name' or 'project-id=id project-name=name').
2. If both found:
   - RUN TASK: !{powershell.exe -NoProfile -Command ".\\src\\project_state.ps1 -Action Add -ProjectId '<REPLACE_WITH_ID>' -Name '<REPLACE_WITH_NAME>'"}
   - RUN TASK: !{powershell.exe -NoProfile -Command ".\\src\\start_factory.ps1 -ProjectId '<REPLACE_WITH_ID>' -Agent 'master'"}
   - CONFIRM: "Project <REPLACE_WITH_NAME> (ID: <REPLACE_WITH_ID>) initialized. Master Orchestrator session is launching in a new window."
3. If missing info, explain usage: /fnew <id> <name>
"""
