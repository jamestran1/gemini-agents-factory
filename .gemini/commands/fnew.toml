description = "Start a new Gemini Agent Factory project session."
prompt = """
I want to start a new Gemini Agent Factory project session.
Input provided: {{args}}

Instructions for parsing:
1. If Input matches `project-id=(.*) project-name=(.*)` (with potential quotes), use those groups.
2. Otherwise, treat the first word as 'Project ID' and the rest as 'Project Name'.
3. Clean the extracted values: remove surrounding quotes and extra whitespace.

Once parsed:
- RUN: !{powershell.exe -NoProfile -Command ".\\src\\project_state.ps1 -Action Add -ProjectId '<ID>' -Name '<NAME>'"}
- RUN: !{powershell.exe -NoProfile -Command ".\\src\\start_factory.ps1 -ProjectId '<ID>' -Agent 'master'"}
- CONFIRM: "Factory Project '<NAME>' (<ID>) initialized. Master Orchestrator session is launching in a new window."

If Input is empty or insufficient, tell the user: "Usage: /fnew <project-id> <project-name>"
"""
